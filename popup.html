<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 260px;
      background: #21161C;
      color: #fff;
      font-family: 'DM Sans', system-ui, sans-serif;
      padding: 20px;
      margin: 0;
    }

    h1 {
      font-size: 19px;
      font-weight: 300;
      color: #ffffff;
      font-family: 'DM Sans', system-ui, sans-serif;
      letter-spacing: -0.3px;
      margin-bottom: 12px;
    }

    h1 .accent {
      font-family: 'Ogg', Georgia, serif;
      font-weight: 700;
      font-style: italic;
      color: #FF9DE2;
    }

    .settings { display: flex; flex-direction: column; }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .row:last-child { border-bottom: none; }

    .label {
      font-size: 13px;
      font-weight: 500;
      font-family: 'DM Sans', system-ui, sans-serif;
      color: #bbb;
    }

    /* Toggle switch */
    .toggle { position: relative; width: 44px; height: 26px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: #2e1e28;
      border-radius: 26px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      left: 4px; top: 4px;
      background: #555;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    .toggle input:checked + .slider { background: rgba(255,157,226,0.15); }
    .toggle input:checked + .slider::before {
      transform: translateX(18px);
      background: #FF9DE2;
    }

    /* Volume row */
    .volume-row { flex-direction: column; align-items: stretch; gap: 10px; }
    .volume-header { display: flex; justify-content: space-between; align-items: center; }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 5px;
      border-radius: 3px;
      background: rgba(255,255,255,0.12);
      cursor: pointer;
      outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #FF9DE2;
      cursor: pointer;
      margin-top: -6.5px;
    }
    input[type=range]::-webkit-slider-runnable-track {
      height: 5px;
      border-radius: 3px;
    }
    input[type=range]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #FF9DE2;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>thank u, <span class="accent">next</span></h1>

  <div class="settings">
    <div class="row">
      <span class="label">Audio</span>
      <label class="toggle">
        <input type="checkbox" id="audioToggle">
        <span class="slider"></span>
      </label>
    </div>

    <div class="row volume-row">
      <div class="volume-header">
        <span class="label">Volume</span>
        <span id="volumeLabel" style="font-size:13px; color:#C8C7C8; font-family:'DM Sans',system-ui,sans-serif;">100%</span>
      </div>
      <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="1">
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
