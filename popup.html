<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 260px;
      background: #21161C;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 20px;
    }

    h1 {
      font-size: 15px;
      font-weight: 800;
      color: #FF9DE2;
      letter-spacing: -0.3px;
      margin-bottom: 20px;
    }

    .settings { display: flex; flex-direction: column; }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .row:last-child { border-bottom: none; }

    .label {
      font-size: 13px;
      font-weight: 500;
      color: #bbb;
    }

    /* Toggle switch */
    .toggle { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: #2e1e28;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      left: 3px; top: 3px;
      background: #555;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    .toggle input:checked + .slider { background: rgba(255,157,226,0.15); }
    .toggle input:checked + .slider::before {
      transform: translateX(16px);
      background: #FF9DE2;
    }

    /* Volume row */
    .volume-row { flex-direction: column; align-items: stretch; gap: 10px; }
    .volume-header { display: flex; justify-content: space-between; align-items: center; }
    input[type=range] {
      width: 100%;
      accent-color: #FF9DE2;
      cursor: pointer;
      height: 4px;
    }
  </style>
</head>
<body>
  <h1>thank u, next</h1>

  <div class="settings">
    <div class="row">
      <span class="label">Audio</span>
      <label class="toggle">
        <input type="checkbox" id="audioToggle">
        <span class="slider"></span>
      </label>
    </div>

    <div class="row volume-row">
      <div class="volume-header">
        <span class="label">Volume</span>
        <span id="volumeLabel" style="font-size:11px; color:#555;">100%</span>
      </div>
      <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="1">
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
